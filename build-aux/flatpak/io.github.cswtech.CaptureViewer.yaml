id: io.github.cswtech.CaptureViewer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: captureviewer

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Audio in (capture source) and out (default sink), via PipeWire/PulseAudio
  - --socket=pulseaudio
  # Native PipeWire socket. Required for *video* device discovery: on PipeWire
  # systems (incl. SteamOS) GStreamer's pipewiredeviceprovider hides the v4l2
  # provider to avoid duplicates, so without this socket the pipewire provider
  # can't connect ("Host is down"), v4l2 stays hidden, and GstDeviceMonitor
  # reports zero Video/Source devices even though /dev/video* is accessible.
  # PipeWire exposes each capture card with api.v4l2.path=/dev/videoN, so the
  # app still drives v4l2src directly (no camera-portal session needed).
  - --filesystem=xdg-run/pipewire-0
  # Raw access to /dev/video* so v4l2src can open the capture node for streaming.
  - --device=all

modules:
  # gtk4paintablesink lives in gst-plugins-rs. It ships in recent GNOME
  # runtimes; if `gst-inspect-1.0 gtk4paintablesink` fails inside the sandbox,
  # add a build module for gst-plugin-gtk4 here.
  - name: captureviewer
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --no-build-isolation --prefix=/app .
      - install -Dm644 data/io.github.cswtech.CaptureViewer.desktop
        /app/share/applications/io.github.cswtech.CaptureViewer.desktop
      - install -Dm644 data/io.github.cswtech.CaptureViewer.metainfo.xml
        /app/share/metainfo/io.github.cswtech.CaptureViewer.metainfo.xml
      - install -Dm644 data/icons/io.github.cswtech.CaptureViewer.svg
        /app/share/icons/hicolor/scalable/apps/io.github.cswtech.CaptureViewer.svg
    sources:
      - type: dir
        path: ../..
